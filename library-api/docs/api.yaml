#%RAML 1.0
title: Book Library API
version: v1
baseUri: http://localhost:3000/api

mediaType: application/json

types:
  Book:
    type: object
    properties:
      id: integer
      title: string
      author: string
      available: boolean

  Error:
    type: object
    properties:
      errorCode: string
      message: string

/books:
  get:
    description: Get all books
    responses:
      200:
        body:
          application/json:
            type: Book[]

  post:
    description: Add a new book
    body:
      application/json:
        type: Book
    responses:
      201:
        body:
          application/json:
            type: Book
      400:
        body:
          application/json:
            type: Error

  /{id}:
    get:
      description: Get book by ID
      responses:
        200:
          body:
            application/json:
              type: Book
        404:
          body:
            application/json:
              type: Error

    delete:
      description: Delete a book
      responses:
        204:
        404:
          body:
            application/json:
              type: Error